name: Facinations CI – Contracts + Subgraph Lock

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  facinations-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts (Hardhat)
        run: npx hardhat compile

      - name: Verify ABI events
        run: node scripts/verify-events.js

      - name: Generate subgraph.yaml
        run: node scripts/generate-subgraph.js

      - name: Graph codegen
        run: |
          cd subgraph
          npx graph codegen

      - name: Graph build
        run: |
          cd subgraph
          npx graph build

